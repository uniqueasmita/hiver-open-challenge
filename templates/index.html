<!DOCTYPE html>
<html>
<head>
    <title>Hiver AI Email Assistant</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.1);
        }

        textarea{
            width:100%;
            height:120px;
            font-size:16px;
            padding:10px;
        }

        button{
            margin-top:15px;
            padding:12px 25px;
            font-size:16px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        pre{
            background:#eeeeee;
            padding:15px;
            margin-top:20px;
            white-space:pre-wrap;
        }

    </style>

</head>

<body>

<div class="container">

<h2>📧 Hiver AI Email Suggestion System</h2>

<textarea id="email" placeholder="Enter customer email here..."></textarea>

<br>

<button onclick="generate()">Generate Reply</button>

<pre id="output"></pre>

</div>

<script>

async function generate(){

    const email=document.getElementById("email").value;

    const response=await fetch("/generate?email="+encodeURIComponent(email),{

        method:"POST"

    });

    const data=await response.json();

    document.getElementById("output").textContent=
JSON.stringify(data,null,4);

}

</script>

</body>

</html>
